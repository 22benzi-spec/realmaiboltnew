name: agent-gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify docs
        run: npm run verify:docs

      - name: Build project
        run: npm run build

      - name: Scan risk
        run: npm run verify:risk

      - name: Run local reviewer
        run: npm run review:local

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-review
          path: .harness/reviews/local-review.json
